<!-- HTML = HyperText Markup Language -->

<p>
  Paragraph   of  text
</p>

<!-- HTML collapses consecutive spaces into a single space. -->

<button>
  Hello
</button>

<!-- <p>
  Paragraph of text
</p> -->

<!--
1. HTML Elements:
- Everything displayed on a webpage is an HTML element.
- Examples: paragraphs, buttons, and links.
- HTML elements are the building blocks of a web page.
-->

<!--
2. HTML Syntax:
- Syntax refers to the rules for writing HTML.
- Most HTML elements consist of:
  1. Opening tag
  2. Content
  3. Closing tag

Examples:
<button>Hello</button>
<p>Content</p>
-->

<!-- Anchor (<a>) element: used to create hyperlinks. -->

<!-- Opens in the same tab (default behavior). -->
<a href="https://www.youtube.com/">
  Link to YouTube
</a>

<!--
3. HTML Attributes:
- Attributes provide additional information about an element.
- They modify an element's behavior or appearance.
- href specifies the destination URL.

Attribute syntax:
href="https://www.youtube.com/"
attribute_name="attribute_value"

- An element can have multiple attributes.
-->

<p>
  This link opens in a new tab.
</p>

<!-- Opens the link in a new tab using target="_blank". -->
<!-- Multiple attributes: target="_blank" opens the link in a new tab. -->
<a href="https://www.youtube.com/" target="_blank">
  Link to YouTube
</a>

<p>
  Link following modern best practices.
</p>

<!--
4. Link Best Practices:
- href specifies the destination URL.
- target="_blank" opens the link in a new tab.
- rel="noopener noreferrer" improves security when opening links in a new tab.
-->
<a
  href="https://www.youtube.com/"
  target="_blank"
  rel="noopener noreferrer">
  Link to YouTube
</a>

<!--
5. HTML Whitespace Rules:
i. Multiple spaces are treated as a single space.
ii. Line breaks are treated as spaces in normal HTML text.

Summary:
- HTML collapses consecutive spaces into a single space.

The following examples produce the same output:
1. <p>Paragraph of text</p>
2. <p>Paragraph     of     text</p>
3. <p>
  Paragraph of text
</p>
-->
